<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Approve Form</h1>

    {% for form in forms %}
        <p>
        {% if form.approve_status == 1 %}
            <a href="{% url 'dashboard:get_form' form.id %}">{{ form }}</a>
        </p>
        {% else %}
            {{ form }}
        {% endif %}
    {% empty %}
    <p>No form available.</p>
    {% endfor %}

    <p><a href="{% url 'dashboard:dashboard' %}">GO BACK</a></p>
</body>
</html>
