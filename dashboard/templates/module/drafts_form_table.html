{% load static %}
{% load thai_locale %}

<div id="body-table">
    <table class="styled-table">
        <thead>
            <tr>
                <th colspan="7">คำร้องที่กำลังเขียนอยู่</th>
            </tr>
            <tr>
                <th>ผู้ร่าง</th>
                <th>เจ้าของร่าง</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for draft in drafts %}
            <tr>
                <td>{{  draft.form_creator  }}</td>
                <td>{{  draft.form_owner  }}</td>
                <td>
                    <a href="{% url 'forms:edit-draft-step1' draft.pk %}">แก้ไขร่างคำร้อง</a>
                    <a href="{% url 'forms:delete-draft-step1' draft.pk %}">ลบร่างคำร้อง</a>
                    <a href="{% url 'forms:create-reqform' draft.pk %}">สร้างฟอร์ม</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="7">No forms available.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
