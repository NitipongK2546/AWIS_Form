{% load static %}
<header id="awis-header-container" class="no-print" style="all: unset; display: block; width: 100%; z-index: 999;">
  <div id="awis-system-header" style="display: block; width: 100%;"></div>

  <script>
    const host = document.querySelector('#awis-system-header');
    const shadow = host.attachShadow({ mode: 'open' });

    // Detect active page
    const currentPath = window.location.pathname;

    function isActive(href) {
      return currentPath === href || currentPath.startsWith(href + '/');
    }

    shadow.innerHTML = `
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        .header-full {
          background: linear-gradient(90deg, #213259 0%, #7F1D1D 60%, #C9161C 100%);
          font-family: 'Noto Sans Thai', sans-serif;
          box-shadow: 0 2px 8px rgba(0,0,0,0.25);
          width: 100%;
          height: 48px;
          display: flex;
          align-items: center;
          padding: 0 16px;
          gap: 12px;
          position: relative;
        }

        /* ── Logo pill ── */
        .logo-pill {
          display: flex;
          align-items: center;
          gap: 8px;
          background: rgba(255,255,255,0.15);
          border-radius: 999px;
          padding: 4px 12px 4px 4px;
          flex-shrink: 0;
          text-decoration: none;
        }

        .logo-circle {
          width: 32px;
          height: 32px;
          border-radius: 50%;
          background: white;
          display: flex;
          align-items: center;
          justify-content: center;
          overflow: hidden;
          flex-shrink: 0;
        }

        .logo-circle img {
          width: 24px;
          height: auto;
        }

        .logo-text {
          color: white;
          font-size: 14px;
          font-weight: 600;
          white-space: nowrap;
        }

        /* ── Nav links (center) ── */
        .nav-links {
          display: flex;
          align-items: center;
          gap: 2px;
          flex: 1;
          justify-content: center;
        }

        .nav-link {
          color: rgba(255,255,255,0.85);
          text-decoration: none;
          font-size: 13px;
          font-weight: 500;
          padding: 5px 12px;
          border-radius: 6px;
          white-space: nowrap;
          transition: background 0.15s, color 0.15s;
        }

        .nav-link:hover {
          background: rgba(255,255,255,0.15);
          color: #fff;
        }

        .nav-link.active {
          background: rgba(255,255,255,0.22);
          color: #fff;
          font-weight: 600;
        }

        /* ── User area (right) ── */
        .user-area {
          display: flex;
          align-items: center;
          gap: 8px;
          flex-shrink: 0;
        }

        .user-avatar {
          width: 28px;
          height: 28px;
          border-radius: 50%;
          background: rgba(255,255,255,0.25);
          display: flex;
          align-items: center;
          justify-content: center;
        }

        .user-avatar svg {
          width: 16px;
          height: 16px;
          fill: white;
        }

        .username {
          color: rgba(255,255,255,0.9);
          font-size: 13px;
          font-weight: 500;
          white-space: nowrap;
        }

        .btn-logout {
          background: white;
          color: #C9161C;
          border: none;
          border-radius: 6px;
          padding: 4px 12px;
          font-size: 12px;
          font-weight: 600;
          cursor: pointer;
          text-decoration: none;
          font-family: 'Noto Sans Thai', sans-serif;
          transition: background 0.15s;
          white-space: nowrap;
        }

        .btn-logout:hover {
          background: #ffe0e0;
        }
      </style>

      <div class="header-full">

        <!-- Logo -->
        <a class="logo-pill" href="/dashboard/">
          <div class="logo-circle">
            <img src="{% static 'images/TCCT_LOGO.png' %}" alt="TCCT">
          </div>
          <span class="logo-text">ระบบ AWIS</span>
        </a>

        <!-- Nav links -->
        <nav class="nav-links">
          <a class="nav-link" href="{% url 'dashboard:dashboard' %}" id="nav-dashboard">หน้าหลัก</a>
          <a class="nav-link" href="{% url 'dashboard:statistics' %}" id="nav-stats">รายงานสถิติ</a>
          <a class="nav-link" href="{% url 'forms:draft-page' %}" id="nav-draft">ร่างคำร้อง</a>
          <a class="nav-link" href="{% url 'admin_panel:collections' %}" id="nav-admin">Admin Page</a>
        </nav>

        <!-- User area -->
        <div class="user-area">
          <div class="user-avatar">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
            </svg>
          </div>
          <span class="username">{{ user.username }}</span>
          <a class="btn-logout" href="{% url 'users:logout' %}">logout</a>
        </div>

      </div>
    `;

    // Apply active class based on current path
    const links = shadow.querySelectorAll('.nav-link');
    links.forEach(link => {
      const href = link.getAttribute('href');
      if (href && (currentPath === href || currentPath.startsWith(href.replace(/\/$/, '')))) {
        link.classList.add('active');
      }
    });
  </script>
</header>
