{% load static %}
<header id="awis-header-container" class="no-print" style="all: unset;">
  <div id="awis-system-header" style="display: block;"></div>

  <script>
    const host = document.querySelector('#awis-system-header');
    const shadow = host.attachShadow({ mode: 'open' });

    shadow.innerHTML = `
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Sarabun&display=swap');

        .header-full {
          background: linear-gradient(90deg, #213259, #C9161C);
          color: white;
          font-family: 'Noto Sans Thai', 'IBM Plex Sans Thai', 'Sarabun', sans-serif;
          font-size: 24px;
          font-weight: 700;
          letter-spacing: 1px;
          box-shadow: 0 2px 6px rgba(0,0,0,0.2);
          justify-content: center;
          display: flex;
        }

        .header-inside {
          all: unset;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 15px;

          width: 100vw;
          padding: 20px 0;
          margin: 0;
        }

        .logo {
          display: flex;
          gap: 5px;
        }
        
        .logo img {
          max-width: 100px;
          height: auto;
        }

        .hex {
          width: 22px;
          height: 22px;
          clip-path: polygon(50% 0%, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
        }

        .header-text {
          color: white;
          cursor: pointer;
          text-decoration: none;
        }
        
        .header-inside {
          display: flex;
          align-items: center;
          gap: 20px; /* ระยะห่างระหว่างเมนู */
        }
        .header-text {
          color: white;
          text-decoration: none;
          font-weight: 60;
          font-size: 18px;
        }
        .header-text:hover {
          text-decoration: underline;
        }
        
        .button-logout {
          margin-left: 10px;
          background: #e53935;
          color: white;
          padding: 5px 12px;
          border-radius: 6px;
          text-decoration: none;
          font-size: 14px;
          transition: background 0.3s;
        }

        .button-logout:hover {
          background: #b71c1c;
        }
        
      </style>

      <div class="header-full">
        <span class="header-inside">
          <div class="logo">
            <img src="{% static 'images/TCCT_LOGO.png' %}" alt="TCCT_Logo" >
          </div>
          <a class="header-text" href="{% url 'dashboard:dashboard' %}">ระบบ AWIS</a>

          <a class="header-text" href="{% url 'forms:draft-page' %}">ร่างคำร้อง</a>
          {% comment %} <a class="header-text" href="{% url 'dashboard:approve_table_page' %}">อนุมัติคำร้อง</a> {% endcomment %}
          {% comment %} <a class="header-text" href="{% url 'dashboard:accept_table_page' %}">ยืนยันการใช้หมายจับ</a> {% endcomment %}
          {% comment %} <a class="header-text" href="{% url 'dashboard:warrant_status_page' %}">ตารางสถานะของหมายศาล</a> {% endcomment %}
          <a class="header-text" href="{% url 'dashboard:accept_table_page' %}">สถิติหมายจับรายปี</a>
          <a class="header-text" href="{% url 'admin_panel:collections' %}">Admin Page</a>
          <a class="header-text" style="color: #213259; text-decoration: none;font-weight: 600;"> ชื่อผู้ใช้งาน: <span class="username-value">{{ user.username }}</span> <a class="button-logout" href="{% url 'users:logout' %}" class="button-logout">logout</a> </a>
        </span>
      </div>
    `;
  </script>
</header>
