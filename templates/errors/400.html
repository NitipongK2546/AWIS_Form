<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>400 - Client Error</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Noto Sans Thai', 'IBM Plex Sans Thai', 'Sarabun', sans-serif;}

</head>

    <div class="error-container">
        <div class="error-code">400</div>
        <h2 class="mb-3">Client Error</h2>

        <a href="#" onclick="history.back();" class="btn btn-primary btn-custom" style="font-size: 1.2rem;">กลับไปหน้าก่อน</a>
    </div>

</html>
