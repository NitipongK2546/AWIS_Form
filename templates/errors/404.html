<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>404 - Page Not Found</title>
    <link rel="stylesheet" href="/static/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Noto Sans Thai', 'IBM Plex Sans Thai', 'Sarabun', sans-serif; }
        .error-container { max-width: 600px; margin: 80px auto; text-align: center; }
        .error-code { font-size: 6rem; font-weight: bold; color: #ffc107; }
        .btn-custom { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h2 class="mb-3">Page Not Found</h2>
        <p class="text-muted">ไม่พบหน้าที่คุณต้องการ</p>
        <a href="/" class="btn btn-primary btn-custom">กลับไปหน้าแรก</a>
    </div>
</body>
</html>
