<dialog id="dialog-box">

    <div id="dialog-icon">
        <i class="ti ti-alert-triangle" aria-hidden="true"></i>

    <div id="dialog-choices">
        <button id="dialog-cancel" class="dialog-btn dialog-btn-cancel">ไม่ใช่</button>
        <button id="dialog-confirm" class="dialog-btn dialog-btn-confirm">ใช่</button>
    </div>
</dialog>
<style>
    #dialog-box {
        border: 0.5px solid rgba(0,0,0,0.12);
        border-radius: 12px;
        padding: 1.75rem 1.5rem 1.25rem;
        width: 340px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.18);
        background: white;
        color: #202124;
        font-family: 'Noto Sans Thai', 'IBM Plex Sans Thai', 'Sarabun', sans-serif;
    }

    #dialog-box::backdrop {
        background: rgba(0,0,0,0.4);
    }

    #dialog-icon {
        display: flex;
        justify-content: center;
        margin-bottom: 12px;
    }

    #dialog-icon i {
        font-size: 28px;
        color: #B45309; /* สีน้ำตาลทองเข้มสำหรับเส้นไอคอน */
        background: #FEF3C7; /* พื้นหลังเหลืองอ่อน */
        border-radius: 50%;
        width: 52px;
        height: 52px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    p#text-label {
        text-align: center;
        font-size: 14px;
        font-weight: 500;
        color: #202124;
        margin: 0 0 1.25rem;
        line-height: 1.5;
    }

    div#dialog-choices {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        border-top: 0.5px solid #f0f0f0;
        padding-top: 1rem;
    }

    .dialog-btn {
        padding: 7px 20px;
        border-radius: 7px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        font-family: 'Noto Sans Thai', 'IBM Plex Sans Thai', 'Sarabun', sans-serif;
        transition: background .15s, opacity .15s;
    }

    .dialog-btn-cancel {
        background: #fff;
        color: #444;
        border: 0.5px solid #dadce0;
    }

    .dialog-btn-cancel:hover {
        background: #f1f3f4;
    }

    .dialog-btn-confirm {
        background: #9B1C1C;
        color: #fff;
        border: none;
    }

    .dialog-btn-confirm:hover {
        background: #7F1D1D;
    }
</style>
<script>
const dialog_element = document.getElementById('dialog-box');
const text_label = document.getElementById('text-label');
</script>
<script>
    function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            // Does this cookie string begin with the name we want?
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
</script>
