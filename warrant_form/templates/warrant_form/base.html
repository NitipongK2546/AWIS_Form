{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Document{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/font_settings.css' %}">
    {% block style %}{% endblock %}
</head>
<body>
    {% block form %}

    {% block content %}
    {% endblock %}

    {% block defer_script %}

    {% endblock %}
</body>
</html>
