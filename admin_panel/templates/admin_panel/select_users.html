<h1>Select ERP Users</h1>

{% if success %}
  <p style="color: green;">{{ success }}</p>
{% endif %}

<form method="post">
  {% csrf_token %}
  <table>
    <tr>
      <th>Select</th>
      <th>User ID</th>
      <th>Name</th>
      <th>Department</th>
      <th>Position</th>
    </tr>
    {% for user in users %}
    <tr>
      <td><input type="checkbox" name="selected_users" value="{{ user.USR_ID }}"></td>
      <td>{{ user.USR_ID }}</td>
      <td>{{ user.USR_PREFIX }}{{ user.USR_FNAME }} {{ user.USR_LNAME }}</td>
      <td>{{ user.Dept }}</td>
      <td>{{ user.Position }}</td>
    </tr>
    {% endfor %}
  </table>
  <button type="submit">Grant Access</button>
</form>
<form method="post" action="{% url 'admin_panel:add_specific_user' %}">
  {% csrf_token %}
  <button type="submit">Add ชลสิทธิ์</button>
</form>
