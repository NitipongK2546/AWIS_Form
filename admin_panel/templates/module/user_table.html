{% load static %}

<div id="body-table">
    <table class="styled-table">
        <thead>
            <tr>
                <th colspan="4">รายการ User ทั้งหมด</th>
            </tr>
            <tr>
                <th>ID</th>
                <th>ชื่อ-นามสกุล</th>
                <th>สิทธิกลุ่ม</th>
                <th>สิทธิผู้ใช้</th>
            </tr>
        </thead>
        <tbody>
            {% for data in user_list %}
            <tr>
                <td>{{ data.id }}</td>
                <td>{{ data.full_name }}</td>
                <td>{{ data.group_perm }}</td>
                <td>{{ data.user_perm }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4">No users available.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
